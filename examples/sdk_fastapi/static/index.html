<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic SDK Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; height: 100dvh; display: flex; flex-direction: column; }

    header { padding: 1rem 1.5rem; border-bottom: 1px solid #1e2030; display: flex; align-items: center; gap: .75rem; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    .badge { font-size: .7rem; padding: .2rem .5rem; border-radius: 99px; background: #2d4a7a; color: #93c5fd; }
    .session-id { font-size: .7rem; color: #64748b; margin-left: auto; }

    #messages { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

    .msg { display: flex; gap: .75rem; max-width: 760px; width: 100%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar { width: 2rem; height: 2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .85rem; flex-shrink: 0; }
    .msg.user .avatar { background: #3b82f6; }
    .msg.assistant .avatar { background: #1e2030; border: 1px solid #2d3748; }
    .bubble { padding: .65rem 1rem; border-radius: .75rem; line-height: 1.6; font-size: .9rem; max-width: calc(100% - 3rem); }
    .msg.user .bubble { background: #2d4a7a; border-radius: .75rem .1rem .75rem .75rem; }
    .msg.assistant .bubble { background: #1e2030; border-radius: .1rem .75rem .75rem .75rem; white-space: pre-wrap; }
    .bubble.streaming::after { content: "▋"; display: inline-block; animation: blink .9s step-end infinite; margin-left: 2px; }
    @keyframes blink { 50% { opacity: 0; } }

    .tool-call { font-size: .75rem; color: #94a3b8; padding: .3rem .6rem; background: #0f1117; border-left: 2px solid #3b82f6; border-radius: .25rem; margin-bottom: .4rem; }
    .tool-call.error { border-color: #ef4444; color: #fca5a5; }
    .usage { font-size: .7rem; color: #4b5563; margin-top: .4rem; }

    #composer { padding: 1rem 1.5rem; border-top: 1px solid #1e2030; display: flex; gap: .75rem; }
    #input { flex: 1; background: #1e2030; border: 1px solid #2d3748; border-radius: .5rem; color: #e2e8f0; padding: .65rem 1rem; font-size: .9rem; resize: none; min-height: 2.6rem; max-height: 8rem; overflow-y: auto; }
    #input:focus { outline: none; border-color: #3b82f6; }
    button { background: #3b82f6; color: #fff; border: none; border-radius: .5rem; padding: .65rem 1.2rem; cursor: pointer; font-size: .9rem; font-weight: 500; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #2563eb; }
    #clear-btn { background: transparent; border: 1px solid #2d3748; color: #94a3b8; font-size: .8rem; padding: .4rem .8rem; }
    #clear-btn:hover:not(:disabled) { background: #1e2030; }
  </style>
</head>
<body>
  <header>
    <div class="avatar" style="background:#3b82f6">🤖</div>
    <h1>Agentic SDK</h1>
    <span class="badge">streaming</span>
    <span class="session-id" id="session-label">new session</span>
    <button id="clear-btn" onclick="clearSession()">New session</button>
  </header>

  <div id="messages"></div>

  <div id="composer">
    <textarea id="input" placeholder="Ask anything…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    let sessionId = null;
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send-btn');
    const sessionLabel = document.getElementById('session-label');

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 128) + 'px';
    });
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function clearSession() {
      if (sessionId) {
        fetch(`/api/agent/sessions/${sessionId}`, { method: 'DELETE' }).catch(() => {});
      }
      sessionId = null;
      sessionLabel.textContent = 'new session';
      messagesEl.innerHTML = '';
    }

    function appendMsg(role, text = '') {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '👤' : '🤖';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (text) bubble.textContent = text;
      div.appendChild(avatar);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function appendTool(bubble, name, input, isError = false) {
      const el = document.createElement('div');
      el.className = `tool-call${isError ? ' error' : ''}`;
      el.textContent = isError
        ? `✗ ${name}: ${input}`
        : `⚙ ${name}(${Object.values(input).map(v => JSON.stringify(v)).join(', ')})`;
      bubble.parentElement.insertBefore(el, bubble);
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      appendMsg('user', text);
      const aiBubble = appendMsg('assistant');
      aiBubble.classList.add('streaming');
      let fullText = '';

      try {
        const resp = await fetch('/api/agent/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: sessionId }),
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n\n');
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') break;
            const event = JSON.parse(payload);
            if (event.type === 'session') {
              sessionId = event.session_id;
              sessionLabel.textContent = `session: ${sessionId.slice(0, 8)}…`;
            } else if (event.type === 'text') {
              fullText += event.text;
              aiBubble.textContent = fullText;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (event.type === 'tool_start') {
              appendTool(aiBubble, event.tool_name, event.tool_input);
            } else if (event.type === 'tool_result' && event.is_error) {
              appendTool(aiBubble, event.tool_name, event.content, true);
            } else if (event.type === 'done') {
              const usage = document.createElement('div');
              usage.className = 'usage';
              usage.textContent = `${event.input_tokens} in · ${event.output_tokens} out · $${event.cost_usd.toFixed(4)}`;
              aiBubble.appendChild(usage);
            } else if (event.type === 'error') {
              aiBubble.textContent = `Error: ${event.message}`;
              aiBubble.style.color = '#fca5a5';
            }
          }
        }
      } catch (err) {
        aiBubble.textContent = `Network error: ${err.message}`;
        aiBubble.style.color = '#fca5a5';
      } finally {
        aiBubble.classList.remove('streaming');
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }
  </script>
</body>
</html>
